<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retirement Message</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div
      class="background"
      style="background-image: url('https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=1600&q=80');"
    ></div>
    <div class="overlay"></div>
    <div class="overlay-light"></div>

    <div class="petals" id="petals"></div>

    <main class="content">
      <section class="card">
        <p class="eyebrow">Retirement Message</p>

        <div class="message-window">
          <div class="message-scroll" id="messageScroll">
胸を張れ。 
君はここで、確かに戦い抜いた。

楽な道ではなかったはずだ。
迷い、悩み、それでも前を向いて歩き続けた日々――そのすべてが、君の力になっている。

別れは終わりじゃない。
それは、新しい任務の始まりだ。

どんな場所へ行こうとも、ここで培った覚悟は消えない。
苦しい時は思い出せ。
自分がどれだけの時間をかけて、どれだけの壁を越えてきたかを。

心を燃やせ。
自分の信じる道を、最後まで貫け。

そして忘れるな。
君は一人じゃない。
ここで共に過ごした仲間たちは、いつまでも君の背中を押している。

行け。
君の新しい物語は、もう始まっている。

          </div>

          <div class="ending-image" id="endingImage">
            <img
              src="スクリーンショット 2026-03-23 173327.png"
              alt="最後に表示する画像"
            />
          </div>
        </div>

        <div class="audio-wrap">
          <audio controls preload="metadata"
            src="./bgm.mp3">
          </audio>
        </div>
      </section>
    </main>
  </div>

  <!-- ここを追加 -->
  <script src="main.js"></script>
</body>
</html>
